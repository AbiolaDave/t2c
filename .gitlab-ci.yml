workflow:
  rules:
    # Merge request pipelines
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always

    # Main branch pipelines (needed for dev auto-deploy)
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always

    # Tag pipelines (needed for production release flow)
    - if: '$CI_COMMIT_TAG'
      when: always

    # Block everything else to avoid duplicate/extra pipelines
    - when: never

stages:
  - validate
  - build
  - deploy

variables:
  NODE_VERSION: "20"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

default:
  image: node:${NODE_VERSION}-alpine
  cache:
    key: "${CI_COMMIT_REF_SLUG}-node-${NODE_VERSION}"
    paths:
      - .npm/
  before_script:
    - node -v
    - npm -v

# Validate: install + lint + (optional) tests
validate:
  stage: validate
  script:
    - npm ci
    - npm run lint
    - npm test --if-present
  rules:
    - when: always

# Build (Next.js)
build:
  stage: build
  script:
    - npm ci
    - npm run build
  artifacts:
    expire_in: 1 day
    paths:
      - .next/
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'

# Deploy to dev (auto from main)
deploy:dev:
  stage: deploy
  needs: ["build"]
  script:
    - echo "Auto-deploying to dev environment..."
    # TODO: add real dev deploy steps
  environment:
    name: dev
    url: https://dev.example.com
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success

# Deploy to staging (manual from main)
deploy:staging:
  stage: deploy
  needs: ["build"]
  script:
    - echo "Deploying to staging environment..."
    # TODO: add real staging deploy steps
  environment:
    name: staging
    url: https://staging.example.com
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual

# Deploy to production (manual on version tags only)
deploy:production:
  stage: deploy
  needs: ["build"]
  script:
    - echo "Deploying to production environment..."
    # TODO: add real production deploy steps
  environment:
    name: production
    url: https://example.com
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: manual

